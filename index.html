<!DOCTYPE html>
<html>

    <head>
        <title>Snake Html</title>

        <link href="https://fonts.googleapis.com/css2?family=Antic+Slab&display=swap" rel="stylesheet">

        <style>
            #gameCanvas {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            #score {
                text-align: center;
                font-size: 120px;
                font-family: 'Antic Slab', serif;
            }

            #gameOverMsg {
                text-align: center;
                font-size: 60px;
                font-family: 'Antic Slab', serif;
                color: darkred;
            }
        </style>

    </head>

    <body>

        <!-- Score display -->
        <div id="score">0</div>

        <div id="gameOverMsg" style="display:none;">Game Over!!</div>

        <!-- Game canvas -->
        <canvas id="gameCanvas" width="300" height="300"></canvas>

        <script>

            // Get the canvas element
            const gameCanvas = document.getElementById("gameCanvas");  // blank drawing board

            // Return a two dimensional drawing context
            const ctx = gameCanvas.getContext("2d");  // ctx = context, drawing tool 

            // --------- Constants ---------

            const GAME_SPEED = 100;
            const CANVAS_BORDER_COLOUR = 'black';
            const CANVAS_BACKGROUND_COLOUR = "white";
            const SNAKE_COLOUR = 'lightgreen';
            const SNAKE_BORDER_COLOUR = 'darkgreen';
            const FOOD_COLOUR = 'red';
            const FOOD_BORDER_COLOUR = 'darkred';


            // --------- Variables ---------

            // creating snake
            let snake = [  {x: 150, y: 150},  {x: 140, y: 150},  {x: 130, y: 150},  {x: 120, y: 150},  {x: 110, y: 150},];

            // Horizontal velocity
            let dx = 10;
            let dy = 0;

            // set score
            let score = 0;

            // lock system to prevent multiple direction changes before the snake moves (within 100ms)
            let changingDirection = false;

            // Food x-coordinate
            let foodX;
            // Food y-coordinate
            let foodY;


            // --------- Functions ---------

            /**
             * Draws a part of the snake on the canvas
             * @param { object } snakePart - The coordinates where the part should be drawn
             */
            function drawSnakePart(snakePart) {  // it will just draws one square
                ctx.fillStyle = SNAKE_COLOUR; 
                ctx.strokeStyle = SNAKE_BORDER_COLOUR;
                ctx.fillRect(snakePart.x, snakePart.y, 10, 10);
                ctx.strokeRect(snakePart.x, snakePart.y, 10, 10);
            }

            /**
             * Loops through all of the snake parts and Draws the snake on the canvas
             */
            function drawSnake() {
                snake.forEach(drawSnakePart);
            }


            /**
             * Changes the vertical and horizontal velocity of the snake according to the
             * key that was pressed.
             * The direction cannot be switched to the opposite direction, to prevent the snake
             * from reversing
             * For example if the the direction is 'right' it cannot become 'left'
             * @param { object } event - The keydown event
             */
            function changeDirection (event) {
                const LEFT_KEY = 37;  
                const RIGHT_KEY = 39;  
                const UP_KEY = 38;  
                const DOWN_KEY = 40;

                const keyPressed = event.keyCode;  

                // check the current direction of the snake to prevent reversing
                const goingUp = dy === -10;  
                const goingDown = dy === 10;  
                const goingRight = dx === 10;  
                const goingLeft = dx === -10;


                /**
                 * Prevent the snake from reversing
                 * Example scenario:
                 * Snake is moving to the right. User presses down and immediately left
                 * and the snake immediately changes direction without taking a step down first
                 */
                if (changingDirection) return;   // block extra inputs
                changingDirection = true;  // lock direction change

                if (keyPressed === LEFT_KEY && !goingRight) {
                    dx = -10;    
                    dy = 0;  
                }

                if (keyPressed === UP_KEY && !goingDown) {
                    dx = 0;    
                    dy = -10;  
                }

                if (keyPressed === RIGHT_KEY && !goingLeft) {
                    dx = 10;    
                    dy = 0;  
                }

                if (keyPressed === DOWN_KEY && !goingUp) { 
                    dx = 0;    
                    dy = 10;  
                }
            }


            /**
             * Advances the snake by changing the x-coordinates of its parts
             * according to the horizontal velocity and the y-coordinates of its parts
             * according to the vertical veolocity
             */
            function advanceSnake() {

                // take current head and move it forward by dx
                const head = {
                    x: snake[0].x + dx, 
                    y: snake[0].y + dy
                };

                // put new head at the start of the array
                snake.unshift(head);

                // flag to check if snake head is touching food
                const didEatFood = snake[0].x === foodX && snake[0].y === foodY;
                
                if (didEatFood) {

                    // Increase score
                    score += 10;
                    // update screen with the new score
                    document.getElementById('score').innerHTML = score;


                    // Generate new food location
                    createFood();

                } else {

                    // remove the last block
                    snake.pop();
                }
            }


            /**
             * Generates a random number that is a multiple of 10 (so that it is in 10 px) given a minumum
             * and a maximum number for coordinates of food
             * @param { number } min - The minimum number the random number can be
             * @param { number } max - The maximum number the random number can be
             */
            function randomTen(min, max) {
                return Math.round((Math.random() * (max-min) + min) / 10) * 10;
            }


             /**
             * Creates random set of coordinates for the snake food.
             */
            function createFood() { 

                // make a random position that is on grid
                foodX = randomTen(0, gameCanvas.width - 10);  
                foodY = randomTen(0, gameCanvas.height - 10);

                // check if food is inside snake , preventing food creating on snake
                snake.forEach(function isFoodOnSnake(part) {
                    const foodIsOnSnake = part.x == foodX && part.y == foodY;

                    // if collision, regenerate the food
                    if (foodIsOnSnake)
                    createFood();
                });

            }

            /**
             * Draw the food on the canvas
             */
            function drawFood() {
                ctx.fillStyle = FOOD_COLOUR;
                ctx.strokeStyle = FOOD_BORDER_COLOUR;
                ctx.fillRect(foodX, foodY, 10, 10);
                ctx.strokeRect(foodX, foodY, 10, 10);
            }


            /**
             * Returns true if the head of the snake touched another part of the game
             * or any of the walls
             */
            function didGameEnd() {

                // i start at 4 as snake begins with index 0,1,2,3,4 and it cant collide with itself for
                // index 1,2,3 and there is no point to compare with the head again
                for (let i = 4; i < snake.length; i++) {
        
                    const didCollide = snake[i].x === snake[0].x && snake[i].y === snake[0].y;

                    if (didCollide) return true;
                }

                // check for wall collision
                const hitLeftWall = snake[0].x <0;
                const hitRightWall = snake[0].x > gameCanvas.width - 10;
                const hitTopWall = snake[0].y <0
                const hitBottomWall = snake[0].y > gameCanvas.height - 10;

                // if any of this is true, game ends
                return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
            }

            /**
             * Draws a "Game Over!!" message in the centre of the canvas
             * Called once, when didGameEnd() returns true
             */
            // draw inside the canvas
            function drawGameOver() {
                ctx.fillStyle = 'black';
                ctx.font = '20px "Antic Slab", serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Game Over!!', gameCanvas.width / 2, gameCanvas.height / 2);
            }

            // add on and reuse the score <div>
            function drawGameOver() {
                document.getElementById('score').innerHTML = 'Game Over!! Score: ' + score;
            }

            // hidden div toggled with CSS
            function drawGameOver() {
                document.getElementById('gameOverMsg').style.display = 'block';
            }

            /**
             * Change the background colour of the canvas to CANVAS_BACKGROUND_COLOUR and
             * draw a border around it
             * 
             * Wipes everything on the screen for updating game state
             */
            function clearCanvas() {
                ctx.fillStyle = CANVAS_BACKGROUND_COLOUR;
                ctx.strokeStyle = CANVAS_BORDER_COLOUR;

                ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                ctx.strokeRect(0, 0, gameCanvas.width, gameCanvas.height);
            }

            
            /**
             * Main function of the game
             * called repeatedly to advance the game
             */
            function main() {

                // if snake intercept itself or touch the wall, game end
                if (didGameEnd()) {
                    drawGameOver();
                    return;
                }

                setTimeout( () => {

                    changingDirection = false; // unlock
                    
                    clearCanvas();
                    drawFood();
                    advanceSnake();
                    drawSnake();
                    main(); // repeat forever
                
                }, GAME_SPEED);
            }

            // Start game
            main();
            // Create the first food location
            createFood();

            // Call changeDirection whenever a key is pressed
            document.addEventListener("keydown", changeDirection);


        </script>

    </body>

</html>
