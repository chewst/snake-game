<!DOCTYPE html>
<html>
<head>
<title>Snake Html</title>

<style>
  #gameCanvas {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>

</head>

<body>
    
<canvas id="gameCanvas" width="300" height="300"></canvas>

<script>
    const gameCanvas = document.getElementById("gameCanvas");
    const ctx = gameCanvas.getContext("2d");  // ctx = context


    // creating snake
    let snake = [  {x: 150, y: 150},  {x: 140, y: 150},  {x: 130, y: 150},  {x: 120, y: 150},  {x: 110, y: 150},];

    // Horizontal velocity
    let dx = 10;
    let dy = 0;



    // ------ Function ------

    function drawSnakePart(snakePart) {  // it will just draws one square
        ctx.fillStyle = 'lightgreen'; 
        ctx.strokeStyle = 'darkgreen';
        ctx.fillRect(snakePart.x, snakePart.y, 10, 10);
        ctx.strokeRect(snakePart.x, snakePart.y, 10, 10);
    }

    // loops through all parts and draws the whole snake
    function drawSnake() {
        snake.forEach(drawSnakePart);
    }

    function changeDirection (event) {
        const LEFT_KEY = 37;  
        const RIGHT_KEY = 39;  
        const UP_KEY = 38;  
        const DOWN_KEY = 40;

        const keyPressed = event.keyCode;  

        // check the current direction of the snake to prevent reversing
        const goingUp = dy === -10;  
        const goingDown = dy === 10;  
        const goingRight = dx === 10;  
        const goingLeft = dx === -10;

        if (keyPressed === LEFT_KEY && !goingRight) {
            dx = -10;    
            dy = 0;  
        }

        if (keyPressed === UP_KEY && !goingDown) {
            dx = 0;    
            dy = -10;  
        }

        if (keyPressed === RIGHT_KEY && !goingLeft) {
            dx = 10;    
            dy = 0;  
        }

        if (keyPressed === DOWN_KEY && !goingUp) { 
            dx = 0;    
            dy = 10;  
        }
    }


    // update the snake
    function advanceSnake() {

        // take current head and move it forward by dx
        const head = {
            x: snake[0].x + dx, 
            y: snake[0].y + dy
        };

        // put new head at the start of the array
        snake.unshift(head);

        // flag to check if snake head is touching food
        const didEatFood = snake[0].x === foodX && snake[0].y === foodY;
        
        if (didEatFood) {

            // Generate new food location
            createFood();

        } else {

            // remove the last block
            snake.pop();
        }
    }

    // create random number in 10 px for coordinates of food
    function randomTen(min, max) {
        return Math.round((Math.random() * (max-min) + min) / 10) * 10;
    }

    function createFood() { 

        // make a random position that is on grid
        foodX = randomTen(0, gameCanvas.width - 10);  
        foodY = randomTen(0, gameCanvas.height - 10);

        // check if food is inside snake , preventing food creating on snake
        snake.forEach(function isFoodOnSnake(part) {
            const foodIsOnSnake = part.x == foodX && part.y == foodY;

            // if collision, regenerate the food
            if (foodIsOnSnake)
            createFood();
        });

    }

    function drawFood() {
      ctx.fillStyle = 'red';
      ctx.strokestyle = 'darkred';
      ctx.fillRect(foodX, foodY, 10, 10);
      ctx.strokeRect(foodX, foodY, 10, 10);
    }

    // wipes everything on the screen for updating game state
    function clearCanvas() {
        ctx.fillStyle = "white";
        ctx.strokeStyle = "black";

        ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
        ctx.strokeRect(0, 0, gameCanvas.width, gameCanvas.height);
    }

    function gameLoop() {
        // clear canvas
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, 300, 300);

        ctx.strokeStyle = "black";
        ctx.strokeRect(0, 0, 300, 300);

        dx = 10;

        dy = -10;

        // update game
        advanceSnake();

        // draw game
        drawSnake();

        // repeat
        setTimeout(gameLoop, 200);
    }

    // gameLoop();

    
    function main() {
        setTimeout( () => {
            clearCanvas();
            drawFood();
            advanceSnake();
            drawSnake();
            main(); // repeat forever
        
        }, 100);
    }

    createFood();
    main();

    document.addEventListener("keydown", changeDirection);





</script>

</body>

</html>
