<!DOCTYPE html>
<html>
<head>
<title>Snake Html</title>

<style>
  #gameCanvas {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>

</head>

<body>
    
<canvas id="gameCanvas" width="300" height="300"></canvas>

<script>
    const gameCanvas = document.getElementById("gameCanvas");
    const ctx = gameCanvas.getContext("2d");  // ctx = context

    // // draw background (white box with border)
    // ctx.fillStyle = "white";
    // ctx.fillRect(0, 0, 300, 300);  // fills a rectangle

    // ctx.strokeStyle = "black";
    // ctx.strokeRect(0, 0, 300, 300);  // draws outline 


    // creating snake
    let snake = [  {x: 150, y: 150},  {x: 140, y: 150},  {x: 130, y: 150},  {x: 120, y: 150},  {x: 110, y: 150},];

    // Horizontal velocity
    let dx = 10;
    let dy = 0;



    // ------ Function ------

    function drawSnakePart(snakePart) {  // it will just draws one square
        ctx.fillStyle = 'lightgreen'; 
        ctx.strokeStyle = 'darkgreen';
        ctx.fillRect(snakePart.x, snakePart.y, 10, 10);
        ctx.strokeRect(snakePart.x, snakePart.y, 10, 10);
    }

    // loops through all parts and draws the whole snake
    function drawSnake() {
        snake.forEach(drawSnakePart);
    }

    // update the snake
    function advanceSnake() {

        // take current head and move it forward by dx
        const head = {
            x: snake[0].x + dx, 
            y: snake[0].y + dy
        };

        // put new head at the start of the array
        snake.unshift(head);

        // remove the last block
        snake.pop();
    }

    // wipes everything on the screen for updating game state
    function clearCanvas() {
        ctx.fillStyle = "white";
        ctx.strokeStyle = "black";

        ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
        ctx.strokeRect(0, 0, gameCanvas.width, gameCanvas.height);
    }

    function gameLoop() {
        // clear canvas
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, 300, 300);

        ctx.strokeStyle = "black";
        ctx.strokeRect(0, 0, 300, 300);

        dx = 10;

        dy = -10;

        // update game
        advanceSnake();

        // draw game
        drawSnake();

        // repeat
        setTimeout(gameLoop, 200);
    }

      function stepOne() {
        setTimeout(() => {
            clearCanvas();
            advanceSnake();
            drawSnake();
            stepTwo(); // call next step after finishing
        }, 100);
    }

    function stepTwo() {
        setTimeout(() => {
            clearCanvas();
            advanceSnake();
            drawSnake();
            stepThree(); // go to next step
        }, 100);
    }

    function stepThree() {
        setTimeout(() => {
            clearCanvas();
            advanceSnake();
            drawSnake();
        }, 100);
    }

    // gameLoop();

    clearCanvas();

    drawSnake(); 

    stepOne();





</script>

</body>

</html>
